version: '3.8'

services:
  # Azure Storage Emulator (Blob storage for checkpointing)
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"

  # Event Hubs Emulator
  eventhubs-emulator:
    image: mcr.microsoft.com/azure-messaging/eventhubs-emulator:latest
    container_name: eventhubs-emulator
    depends_on:
      - azurite
    ports:
      - "5672:5672"   # AMQP port
      - "9093:9093"   # Kafka port
    environment:
      - BLOB_SERVER=azurite
      - METADATA_SERVER=azurite
      - ACCEPT_EULA=Y
      - CONFIG_PATH=/Users/azureuser/emulator/Config.json
    volumes:
      - ./Config.json:/Users/azureuser/emulator/Config.json
